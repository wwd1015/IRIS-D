# Posit Connect Deployment Configuration
# Bank Risk Management Dashboard

# Application metadata
name: "Bank Risk Management Dashboard"
description: "Comprehensive risk management dashboard for commercial lending portfolios"
author: "Risk Management Team"
email: "risk@bank.com"

# Application type and runtime
type: "python"
runtime: "python"
python_version: "3.9"

# Entry point
entrypoint: "app.py"

# Dependencies
dependencies:
  - requirements.txt

# Environment variables
environment:
  FLASK_ENV: "production"
  DASH_DEBUG: "false"
  PORT: "8050"

# Resource requirements
resources:
  cpu: "1"
  memory: "2Gi"
  disk: "1Gi"

# Security settings
security:
  authentication: "required"
  ssl: "required"
  session_timeout: "3600"  # 1 hour

# Data access
data_access:
  - type: "file"
    path: "data/"
    permissions: "read"

# Health check
health_check:
  path: "/"
  timeout: "30s"
  interval: "60s"

# Logging
logging:
  level: "INFO"
  format: "json"

# Scaling
scaling:
  min_instances: 1
  max_instances: 5
  target_cpu_utilization: 70

# Network
network:
  port: 8050
  protocol: "http"

# Build settings
build:
  cache: true
  timeout: "600s"  # 10 minutes

# Deployment settings
deployment:
  strategy: "rolling"
  max_surge: 1
  max_unavailable: 0

# Monitoring
monitoring:
  metrics: true
  alerts: true
  dashboard: true 